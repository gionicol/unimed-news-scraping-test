<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unimed Araçatuba</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Lato:wght@400;700&display=swap"
        rel="stylesheet" />
    <style>
        @font-face {
            font-family: 'Unmdsns';
            font-style: normal;
            font-weight: normal;
            src: url(fonts/rg.otf) format('opentype');
        }

        @font-face {
            font-family: 'Unmdsns';
            font-style: normal;
            font-weight: bold;
            src: url(fonts/bd.otf) format('opentype');
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green-dark: #004F4A;
            --green-light: #c5e04b;
            --white: #ffffff;

            /* Animation timing base — shift everything by 4 s */
            --t-fade-in: 4.1s;
            --t-retract: 6.4s;
            --t-header-title: 7.05s;
            --t-slide-sides: 7.2s;
            --t-body: 7.1s;
            --t-img-scale: 11.9s;
            --t-pine-scale: 19s;
        }

        html,
        body {
            font-family: "Unmdsns";
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--green-dark);
        }

        /* ── SCENE ── */
        .scene {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: var(--green-dark);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── PINE TREE BACKGROUND ──
       pinheiro.svg is 1030×690 (ratio ≈ 1.493).
       We scale it to ~115vh height and nudge it right.       */
        .bg-pine {
            position: absolute;
            /* height slightly larger than viewport */
            height: 115vh;
            width: auto;
            /* keep native aspect ratio: 1030/690 ≈ 1.493 */
            aspect-ratio: 1030 / 690;
            top: 50%;
            /* shift right so tree sits centre-right */
            left: 50%;
            opacity: 0.10;
            z-index: 0;
            pointer-events: none;
            animation: continuousScale var(--t-pine-scale) cubic-bezier(.8,1,.8,1) both;
            transform-origin: center center;
            transform: translate(-20%, -50%);
        }

        /* ── INTRO TITLE (phase 1) ── */
        .intro-title {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5%;
            z-index: 10;
            pointer-events: none;
            animation:
                introFadeIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) var(--t-fade-in) both,
                introRetract 0.7s cubic-bezier(0.55, 0, 1, 0.45) var(--t-retract) both;
        }

        .intro-title h1 {
            color: var(--green-light);
            /* fluid font: ~5vw, clamped */
            font-size: clamp(28px, 5vw, 72px);
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
            word-break: break-word;
        }

        @keyframes introFadeIn {
            from {
                opacity: 0;
                transform: scale(0.94);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes introRetract {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            70% {
                opacity: 0;
                transform: translateY(-30vh) scale(0.55);
            }

            100% {
                opacity: 0;
                transform: translateY(-32vh) scale(0.5);
            }
        }

        @keyframes continuousScale {
            0% {
                scale: 1;
            }

            100% {
                scale: 1.2;
            }
        }

        /* ── HEADER ── */
        .card-header {
            position: relative;
            z-index: 5;
            width: 100%;
            /* fluid height ~15% of viewport */
            height: 15vh;
            min-height: 70px;
            max-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 2%;
            flex-shrink: 0;
        }

        /* Logo left */
        .logo-left {
            position: absolute;
            left: 2.2%;
            top: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3vh;
            animation: slideFromLeft 0.65s cubic-bezier(0.22, 1, 0.36, 1) var(--t-slide-sides) both;
        }

        .logo-left img {
            /* 500×136 → display ~13vw wide, min/max clamped */
            width: clamp(90px, 13vw, 180px);
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* Centre title */
        .header-title {
            text-align: center;
            color: var(--green-light);
            font-size: clamp(16px, 2.6vw, 42px);
            font-weight: bold;
            line-height: 1.2;
            /* leave room for logo and QR */
            max-width: 55%;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) var(--t-header-title) both;
        }

        /* QR block right */
        .qr-block {
            position: absolute;
            right: 2.2%;
            top: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6vh;
            /* match logo top margin feel */
            margin-top: 0;
            animation: slideFromRight 0.65s cubic-bezier(0.22, 1, 0.36, 1) var(--t-slide-sides) both;
        }

        .qr-block img,
        .qr-img-placeholder {
            width: clamp(60px, 10vw, 150px);
            height: clamp(60px, 10vw, 150px);
            object-fit: contain;
            display: block;
            border-radius: 4px;
        }

        .qr-label {
            color: var(--white);
            font-size: clamp(8px, 0.85vw, 13px);
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.4px;
            line-height: 1.3;
            text-transform: uppercase;
        }

        /* ── BODY ── */
        .card-body {
            position: relative;
            z-index: 5;
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1.5vh 6% 2.5vh;
            gap: 1.8vh;
            animation: slideFromBottom 0.7s cubic-bezier(0.22, 1, 0.36, 1) var(--t-body) both;
            overflow: hidden;
        }

        /* Image box */
        .image-box {
            width: 100%;
            max-width: 820px;
            /* flex-grow so it fills available vertical space */
            flex: 1 1 0;
            min-height: 0;
            border-radius: clamp(10px, 1.8vw, 22px);
            overflow: hidden;
            background: #8a8a8a;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            animation: continuousScale var(--t-img-scale) cubic-bezier(.8,1,.8,1) var(--t-body) both;
        }

        /* Text pill */
        .text-pill {
            background: var(--white);
            border-radius: 999px;
            padding: clamp(12px, 2vh, 24px) clamp(20px, 4%, 56px);
            max-width: 1200px;
            width: 100%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-pill p {
            font-size: clamp(13px, 3vw, 28px);
            font-weight: normal;
            color: #1a3a30;
            line-height: 1;
            text-align: center;
            word-break: break-word;
        }

        /* ── KEYFRAMES ── */
        @keyframes slideFromLeft {
            from {
                opacity: 0;
                transform: translateX(-80px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideFromRight {
            from {
                opacity: 0;
                transform: translateX(80px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideFromBottom {
            from {
                opacity: 0;
                transform: translateY(60px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Respect reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-delay: 0ms !important;
            }
        }
    </style>
</head>

<body>

    <div class="scene">

        <!-- Pine tree watermark -->
        <img class="bg-pine" src="pinheiro.svg" alt="" aria-hidden="true" />

        <!-- ═══ PHASE 1: Intro title (populated by JS from JSON) ═══ -->
        <div class="intro-title" aria-hidden="true">
            <h1 id="intro-h1">…</h1>
        </div>

        <!-- ═══ PHASE 2: Card layout ═══ -->

        <header class="card-header">
            <!-- Logo top-left -->
            <div class="logo-left">
                <img src="unimed-logo.png" alt="Unimed Araçatuba" />
            </div>

            <!-- Centre title -->
            <h2 class="header-title" id="header-title">…</h2>

            <!-- QR code + label top-right -->
            <div class="qr-block">
                <img id="qr-img" src="" alt="QR Code — Leia a matéria na íntegra" />
                <p class="qr-label">Leia a matéria<br>na íntegra</p>
            </div>
        </header>

        <main class="card-body">
            <!-- Image masked box -->
            <div class="image-box">
                <img id="main-img" src="" alt="Imagem da matéria" loading="eager" />
            </div>

            <!-- Text pill -->
            <div class="text-pill">
                <p id="subtitle-text">…</p>
            </div>
        </main>

    </div>

    <script>
        (async () => {
            // Read ?item=N from the URL (1-based); default to 1
            const params = new URLSearchParams(window.location.search);
            const itemParam = parseInt(params.get('item'), 10);

            try {
                const res = await fetch('feed.json');
                const data = await res.json();

                // Convert 1-based param to 0-based index; fall back to first item
                const idx = (Number.isFinite(itemParam) && itemParam >= 1 && itemParam <= data.length)
                    ? itemParam - 1
                    : 0;

                const item = data[idx];

                // Populate text
                document.getElementById('intro-h1').textContent = item.title;
                document.getElementById('header-title').textContent = item.title;
                document.getElementById('subtitle-text').textContent = item.subtitle;

                // Populate images
                document.getElementById('main-img').src = item.image;
                document.getElementById('main-img').alt = item.title;
                document.getElementById('qr-img').src = item.qr;

            } catch (err) {
                console.error('Could not load feed.json:', err);
                // Fallback visible text
                ['intro-h1', 'header-title'].forEach(id => {
                    document.getElementById(id).textContent = 'Sem título';
                });
                document.getElementById('subtitle-text').textContent = 'Conteúdo não disponível.';
            }
        })();
    </script>

</body>

</html>
