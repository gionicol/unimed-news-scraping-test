    <style>
        @font-face {
            font-family: 'Unmdsns';
            font-style: normal;
            font-weight: normal;
            src: url(fonts/rg.otf) format('opentype');
        }
        
        @font-face {
            font-family: 'Unmdsns';
            font-style: normal;
            font-weight: bold;
            src: url(fonts/bd.otf) format('opentype');
        }
        
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* ── COLOR SCHEMES ──
        Applied via data-theme attribute on <html>.
        Each scheme overrides the CSS variables below.        */
        
        /* Theme 0 — original dark green */
        :root,
        [data-theme="0"] {
            --bg: #004F4A;
            --pine: #07524D;
            --title: #B1D452;
            --pill-bg: #FFFFFF;
            --pill-text: #004F4A;
            --ui-ink: #FFFFFF;
        }
        
        [data-theme="1"] {
            --bg: #B1D452;
            --pine: #BCD479;
            --title: #07524D;
            --pill-bg: #008B51;
            --pill-text: #FFFFFF;
            --ui-ink: #07524D;
        }
        
        [data-theme="2"] {
            --bg: #00995D;
            --pine: #0CAD6E;
            --title: #FFFFFF;
            --pill-bg: #004F4C;
            --pill-text: #FFFFFF;
            --ui-ink: #FFFFFF;
        }
        
        [data-theme="3"] {
            --bg: #FFFFFF;
            --pine: #E5E5E5;
            --title: #004F4C;
            --pill-bg: #004F4C;
            --pill-text: #FFFFFF;
            --ui-ink: #004F4C;
        }
        
        [data-theme="4"] {
            --bg: #F57921;
            --pine: #EB8741;
            --title: #FFFFFF;
            --pill-bg: #FFFFFF;
            --pill-text: #004F4A;
            --ui-ink: #FFFFFF;
        }
        
        html,
        body {
            font-family: "Unmdsns";
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
        }
        
        /* ── SCENE ── */
        .scene {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: var(--bg);
            overflow: hidden;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            transition: background-color 0s;
            /* instant — theme set before paint */
        }
        
        /* ── PINE TREE BACKGROUND ── */
        .bg-pine {
            position: absolute;
            height: 115vh;
            /* aspect-ratio not supported in Chrome 80; compute from SVG's 1030/690 ratio */
            width: calc(115vh * 1030 / 690);
            top: 50%;
            left: 50%;
            z-index: 0;
            pointer-events: none;
            -webkit-transform-origin: center center;
            transform-origin: center center;
            -webkit-transform: translate(-20%, -50%);
            transform: translate(-20%, -50%);
        }

        /* Make the inline SVG fill its container div */
        .bg-pine svg {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* ── INTRO TITLE (phase 1) ── */
        .intro-title {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            /* narrower than full width so it feels tighter */
            padding: 5% 18%;
            z-index: 10;
            pointer-events: none;
        }
        
        .intro-title h1 {
            color: var(--title);
            font-size: clamp(28px, 5vw, 72px);
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
            word-break: break-word;
        }
        
        /* ── HEADER ── */
        .card-header {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 15vh;
            min-height: 70px;
            max-height: 130px;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            padding: 0 2%;
            -webkit-flex-shrink: 0;
            flex-shrink: 0;
        }
        
        /* Logo left */
        .logo-left {
            position: absolute;
            left: 2.2%;
            top: 20%;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            gap: 0.3vh;
        }
        .logo-left > * + * { margin-top: 0.3vh; }
        
        /* SVG logo — colour driven by currentColor / fill on the SVG itself.
        We set the wrapper's color to --ui-ink so any `fill="currentColor"`
        in the SVG picks it up. We also force it via a CSS filter as fallback. */
        .logo-left svg,
        .logo-left img {
            width: clamp(90px, 13vw, 180px);
            height: auto;
            object-fit: contain;
            display: block;
            /* colour override: all paths become --ui-ink */
            color: var(--ui-ink);
        }
        
        
        #logo-container {
            color: var(--ui-ink);
        }
        
        #logo-container svg,
        #logo-container svg * {
            fill: currentColor !important;
            stroke: currentColor !important;
        }
        
        
        .bg-pine {
            color: var(--pine);
        }
        
        .bg-pine svg,
        .bg-pine svg * {
            fill: currentColor !important;
        }
        
        #logo-container {
            color: var(--ui-ink);
        }
        
        #logo-container svg,
        #logo-container svg * {
            fill: currentColor !important;
        }
        
        /* Centre title */
        .header-title {
            text-align: center;
            color: var(--title);
            font-size: clamp(16px, 2.8vw, 42px);
            font-weight: bold;
            line-height: 1.2;
            max-width: 55%;
            word-break: break-word;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
        }
        
        /* QR block right */
        .qr-block {
            position: absolute;
            right: 2.2%;
            top: 20%;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            gap: 0.6vh;
        }
        .qr-block > * + * { margin-top: 0.6vh; }
        
        .qr-block img {
            width: clamp(60px, 11vw, 150px);
            height: clamp(60px, 11vw, 150px);
            object-fit: contain;
            display: block;
            border-radius: 4px;
        }
        
        .qr-label {
            color: var(--ui-ink);
            font-size: clamp(8px, 1.2vw, 16px);
            font-weight: bold;
            text-align: center;
            letter-spacing: 0.4px;
            line-height: 1.3;
            text-transform: uppercase;
        }
        
        /* ── BODY ── */
        .card-body {
            position: relative;
            z-index: 5;
            
            -webkit-flex: 1 1 auto;
            flex: 1 1 auto;
            min-height: 0;
            /* Fallback for WebViews that ignore min-height:0 on flex children */
            height: 1px;
            
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            
            padding: 1.5vh 6% 2.5vh;
            /* gap not supported in Chrome 80 flexbox; use child margins instead */
            gap: 1.8vh;
            
            overflow: hidden;
        }
        
        /* Flex gap fallback for Chrome 80: add top margin to all but first child */
        .card-body > * + * {
            margin-top: 1.8vh;
        }
        
        .image-box {
            aspect-ratio: 1.65 / 1;
            
            -webkit-flex: 0 1 auto;
            flex: 0 1 auto;
            
            width: auto;
            
            border-radius: clamp(10px, 1.8vw, 22px);
            overflow: hidden;
            background: #8a8a8a;
            
            -webkit-align-self: center;
            align-self: center;
        }
        
        .image-box img {
            width: 100%;
            height: 100%;
            
            object-fit: cover;
            object-position: center;
            
            display: block;
        }
        
        /* Text pill */
        .text-pill {
            background: var(--pill-bg);
            
            border-radius: 999px;
            
            /* clamp() in padding shorthand is buggy on Chrome 80; use padding-top/bottom separately */
            padding-top: 16px;
            padding-bottom: 16px;
            padding-left: 4%;
            padding-right: 4%;
            
            width: 100%;
            max-width: 1200px;
            
            -webkit-flex: 0 0 auto;
            flex: 0 0 auto;
            
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
        }
        
        .text-pill p {
            font-size: clamp(13px, 3vw, 28px);
            font-weight: normal;
            color: var(--pill-text);
            line-height: 1;
            text-align: center;
            word-break: break-word;
        }
        
        /* ==========================================================
        GSAP INITIAL STATES
        ========================================================== */
        
        .image-box img,
        .bg-pine {
            will-change: transform;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        
        .intro-title {
            opacity: 0;
            -webkit-transform: scale(.94);
            transform: scale(.94);
        }
        
        .header-title {
            opacity: 0;
            -webkit-transform: translateY(12px);
            transform: translateY(12px);
        }
        
        .logo-left {
            opacity: 0;
            -webkit-transform: translateX(-80px);
            transform: translateX(-80px);
        }
        
        .qr-block {
            opacity: 0;
            -webkit-transform: translateX(80px);
            transform: translateX(80px);
        }
        
        .card-body {
            opacity: 0;
            -webkit-transform: translateY(60px);
            transform: translateY(60px);
        }
        
        /* fallback for browsers without aspect-ratio */
        
        .image-box {
            width: auto;
            overflow: hidden; 
        }
        
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }        
    </style>

    <h2 class="header-title" id="header-title">…</h2>
    
    <div class="qr-block">
        <img id="qr-img" src="" alt="QR Code — Leia a matéria na íntegra" />
        <p class="qr-label">Leia a matéria<br>na íntegra</p>
    </div>
</header>

<main class="card-body">
    <div class="image-box">
        <img id="main-img" src="" alt="Imagem da matéria" loading="eager" />
    </div>
    <div class="text-pill">
        <p id="subtitle-text">…</p>
    </div>
</main>

</div>

<script type="text/javascript">
    
    (async () => {
        
        const DEFAULT_DELAY = 6.4;
        
        function getIntroDelay() {
            
            const params =
            new URLSearchParams(window.location.search);
            
            const value =
            parseFloat(params.get('delay'));
            
            return Number.isFinite(value)
            ? Math.max(0, value)
            : DEFAULT_DELAY;
        }
        
        const introDelay = getIntroDelay();
        
        function supportsAspectRatio() {
            
            return (
            window.CSS &&
            CSS.supports &&
            CSS.supports('aspect-ratio', '1 / 1')
            );
            
        }
        
        function updateImageBox() {            
            const body =
            document.querySelector('.card-body');
            
            const imageBox =
            document.querySelector('.image-box');
            
            const pill =
            document.querySelector('.text-pill');
            
            if (!body || !imageBox || !pill) {
                return;
            }
            
            // Chrome 80 flex doesn't support gap; fall back to margin-top value
            var computedGap = parseFloat(getComputedStyle(body).gap);
            if (!computedGap || isNaN(computedGap)) {
                computedGap = parseFloat(getComputedStyle(pill).marginTop) || 0;
            }
            
            const aspect = 1.65;
            
            const availableHeight =
            body.clientHeight -
            pill.offsetHeight -
            computedGap;
            
            let height =
            Math.max(100, availableHeight);
            
            let width =
            height * aspect;
            
            const maxWidth =
            Math.min(
            820,
            body.clientWidth
            );
            
            if (width > maxWidth) {
                
                width = maxWidth;
                
                height =
                width / aspect;
            }
            
            imageBox.style.width =
            width + 'px';
            
            imageBox.style.height =
            height + 'px';
        }
        
        function clampValue(min, preferred, max) {
            return Math.min(
            max,
            Math.max(min, preferred)
            );
        }
        
        function supportsClamp() {
            
            return (
            window.CSS &&
            CSS.supports &&
            CSS.supports(
            'font-size',
            'clamp(1px,2px,3px)'
            )
            );
            
        }
        
        function updateResponsiveSizes() {
            
            const vw =
            window.innerWidth;
            
            const vh =
            window.innerHeight;
            
            // .intro-title h1 — clamp(28px, 5vw, 72px)
            const introSize =
            clampValue(28, vw * 0.05, 72);
            document.querySelector('.intro-title h1').style.fontSize = introSize + 'px';
            
            // .header-title — clamp(16px, 2.8vw, 42px)
            const headerTitleEl = document.querySelector('.header-title');
            if (headerTitleEl) {
                headerTitleEl.style.fontSize = clampValue(16, vw * 0.028, 42) + 'px';
            }
            
            // .text-pill p — clamp(13px, 3vw, 28px)
            const pillText = document.querySelector('.text-pill p');
            if (pillText) {
                pillText.style.fontSize = clampValue(13, vw * 0.03, 28) + 'px';
            }
            
            // .qr-label — clamp(8px, 1.2vw, 16px)
            const qrLabel = document.querySelector('.qr-label');
            if (qrLabel) {
                qrLabel.style.fontSize = clampValue(8, vw * 0.012, 16) + 'px';
            }
            
            // .logo-left svg/img — clamp(90px, 13vw, 180px)
            const logoEl = document.querySelector('.logo-left svg, .logo-left img');
            if (logoEl) {
                const logoSize = clampValue(90, vw * 0.13, 180);
                logoEl.style.width = logoSize + 'px';
            }
            
            // .qr-block img — clamp(60px, 11vw, 150px)
            const qrImg = document.querySelector('.qr-block img');
            if (qrImg) {
                const qrSize = clampValue(60, vw * 0.11, 150);
                qrImg.style.width = qrSize + 'px';
                qrImg.style.height = qrSize + 'px';
            }
            
            // .image-box border-radius — clamp(10px, 1.8vw, 22px)
            const imgBox = document.querySelector('.image-box');
            if (imgBox) {
                imgBox.style.borderRadius = clampValue(10, vw * 0.018, 22) + 'px';
            }
            
            // .text-pill padding — equivalent of clamp(12px,2vh,24px) vertical / clamp(20px,4%,56px) horizontal
            const pill = document.querySelector('.text-pill');
            if (pill) {
                const pillV = clampValue(12, vh * 0.02, 24);
                const pillH = clampValue(20, vw * 0.04, 56);
                pill.style.paddingTop = pillV + 'px';
                pill.style.paddingBottom = pillV + 'px';
                pill.style.paddingLeft = pillH + 'px';
                pill.style.paddingRight = pillH + 'px';
            }
        }
        
        function startAnimations() {
            
            const tl =
            gsap.timeline();
            
            tl.to('.intro-title', {
                opacity: 1,
                scale: 1,
                duration: 0.9,
                ease: 'power3.out'
            });
            
            tl.to({}, {
                duration: introDelay
            });
            
            tl.to('.intro-title', {
                y: '-32vh',
                scale: 0.5,
                opacity: 0,
                duration: 0.7,
                ease: 'power2.in'
            });
            
            tl.to('.header-title', {
                opacity: 1,
                y: 0,
                duration: 0.55,
                ease: 'power3.out'
            }, '-=0.05');
            
            tl.to('.card-body', {
                opacity: 1,
                y: 0,
                duration: 0.7,
                ease: 'power3.out'
            }, '-=0.5');
            
            tl.to('.logo-left', {
                opacity: 1,
                x: 0,
                duration: 0.65,
                ease: 'power3.out'
            }, '-=0.55');
            
            tl.to('.qr-block', {
                opacity: 1,
                x: 0,
                duration: 0.65,
                ease: 'power3.out'
            }, '<');
            
            gsap.to('.bg-pine', {
                scale: 1.1,
                duration: 19,
                ease: 'none'
            });
            
            gsap.to('.image-box img', {
                scale: 1.1,
                duration: 11.9,
                ease: 'none',
                delay: introDelay + 0.7
            });
            
        }
        
        function upgradeImage(imgEl) {
            
            const lowSrc =
            imgEl.src;

            console.log(lowSrc);
            
            const hiSrc =
            lowSrc.replace(/(.*)(\/?img\/.*)\.(.*)$/g,"$2-hq.$3");
            
            const preload =
            new Image();
            
            preload.onload = () => {
                imgEl.src = hiSrc;
            };
            
            preload.src = hiSrc;
        }
        
        try {
            
            const res =
            await fetch('feed.json');
            
            const data =
            await res.json();
            
            const today =
            new Date();
            
            const maxMs =
            15 * 24 * 60 * 60 * 1000;
            
            const validItems =
            data.filter(item => {
                
                const diff =
                today -
                new Date(item.date);
                
                return (
                diff >= 0 &&
                diff <= maxMs
                );
                
            });
            
            if (!validItems.length) {
                throw new Error(
                'No recent items'
                );
            }
            
            let lastIndex =
            parseInt(
            localStorage.getItem(
            'lastSeenNewsIndex'
            ),
            10
            ) || 0;
            
            if (
            lastIndex >=
            validItems.length
            ) {
                lastIndex = 0;
            }
            
            const item =
            validItems[lastIndex];
            
            localStorage.setItem(
            'lastSeenNewsIndex',
            (lastIndex + 1) %
            validItems.length
            );
            
            const THEME_COUNT = 5;
            
            let themeIndex =
            parseInt(
            localStorage.getItem(
            'lastSeenThemeIndex'
            ),
            10
            ) || 0;
            
            if (
            themeIndex >=
            THEME_COUNT
            ) {
                themeIndex = 0;
            }
            
            localStorage.setItem(
            'lastSeenThemeIndex',
            (themeIndex + 1) %
            THEME_COUNT
            );
            
            document.documentElement
            .setAttribute(
            'data-theme',
            String(themeIndex)
            );
            
            document.getElementById(
            'intro-h1'
            ).textContent =
            item.title;
            
            document.getElementById(
            'header-title'
            ).textContent =
            item.title;
            
            document.getElementById(
            'subtitle-text'
            ).textContent =
            item.subtitle;
            
            const mainImg =
            document.getElementById(
            'main-img'
            );

            const mainImgMatch =
            item.image.match(
            /img\/.*\..*$/g
            );
            
            mainImg.src =
            mainImgMatch
            ? mainImgMatch[0]
            : item.image;
            
            mainImg.alt =
            item.title;
            
            const qrMatch =
            item.qr.match(
            /qr\/.*\..*$/g
            );
            
            document.getElementById(
            'qr-img'
            ).src =
            qrMatch
            ? qrMatch[0]
            : item.qr;
            
            if (
            mainImg.complete &&
            mainImg.naturalWidth > 0
            ) {
                
                upgradeImage(mainImg);
                
            } else {
                
                mainImg.addEventListener(
                'load',
                () => upgradeImage(mainImg),
                { once: true }
                );
                
            }
            
            if (!supportsAspectRatio()) {
                updateImageBox();
                window.addEventListener(
                'resize',
                updateImageBox
                );
            }
            if (!supportsClamp()) {
                updateResponsiveSizes();
                window.addEventListener(
                'resize',
                updateResponsiveSizes
                );
            }
            
            
            startAnimations();
            
        } catch (err) {
            
            console.error(err);
            
        }
        
    })();
</script>
