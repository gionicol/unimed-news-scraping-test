name: Update Unimed Feed

on:
  schedule:
    - cron: "*/5 * * * *" #roda a cada hora (para a cada 30 minutos: "*/30 * * * *" | para a cada x horas: "0 */x * * *")

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scrape.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update feed"
            git push
          fi
