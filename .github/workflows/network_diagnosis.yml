name: Network Diagnosis

on:
  workflow_dispatch:

jobs:
  run-diagnosis:
    runs-on: ubuntu-latest

    steps:
      - name: Network Diagnostics
        run: |
          echo "=== Testing DNS Resolution ==="
          nslookup https://www.unimed.coop.br/site/web/aracatuba/noticias
          
          echo "=== Testing Network Route ==="
          ping -c 3 https://www.unimed.coop.br/site/web/aracatuba/noticias || true
          
          echo "=== Verbose Connection Test ==="
          curl -I -v --connect-timeout 10 https://www.unimed.coop.br/site/web/aracatuba/noticias
